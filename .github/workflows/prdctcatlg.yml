# Ci for product catalog service

name: Product Catalog CI

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps: 
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go 1.22
      uses: actions/setup-go@v2
      with:
        go-version: 1.22

    - name: Build
      run: |
        cd src/product-catalog
        go mod download
        go build -o product-catalog-service main.go

    - name: Run unit tests
      run: |
        cd src/product-catalog
        go test ./...

  code-quality:
    runs-on: ubuntu-latest

    steps:
        - name: checkout code
          uses: actions/checkout@v4
        
        - name: Setup Go 1.22
          uses: actions/setup-go@v2
          with:
           go-version: 1.22
        
        - name: Run golangci-lint
          uses: golangci/golangci-lint-action@v6
          with:
            version: v1.55.2
            run: golangci-lint run
            working-directory: src/product-catalog

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Docker
      uses: docker/setup-buildx-action@v1

    - name: login to DockerHub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Docker push
      uses: docker/build-push-action@v6
      with:
        context: src/product-catalog
        file: src/product-catalog/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/product-catalog-service:${{ github.run_id }}
   
  update_k8s:
      runs-on: ubuntu-latest
      needs: docker

      steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Update tag in Kubernetes manifests
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/product-catalog:${{github.run_id}}|" kubernetes/productcatalog/deploy.yaml
          
      - name: Commit and push changes
        run: |
          git config --global user.name "Subodha Dash"
          git config --global user.email "subodhadash6@gmail.com"
          git add kubernetes/productcatalog/deploy.yaml
          git commit -m "Update image tag for product-catalog-service"
          git push origin HEAD:main